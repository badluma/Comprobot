name: Send and Wait
description: Send a Discord command and wait for Comprobot Beta to respond

inputs:
  message:
    required: true
    description: Message to send
  channel_id:
    required: true
    description: Discord channel or thread ID to send messages to
  discord_bot_token:
    required: true
    description: Discord bot token
  beta_bot_id:
    required: true
    description: Beta bot user ID to wait for response from
  expected_response:
    required: false
    default: ""
    description: Expected response from Comprobot Beta

runs:
  using: composite
  steps:
    - name: Send message to Discord channel
      env:
        DISCORD_BOT_TOKEN: ${{ inputs.discord_bot_token }}
        DISCORD_CHANNEL_ID: ${{ inputs.channel_id }}
        MESSAGE: ${{ inputs.message }}
      run: |
        PAYLOAD=$(jq -n --arg content "$MESSAGE" '{content: $content}')
        curl -s -X POST \
          -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages"
      shell: bash

    - name: Wait for response
      env:
        DISCORD_BOT_TOKEN: ${{ inputs.discord_bot_token }}
        BETA_BOT_ID: ${{ inputs.beta_bot_id }}
        DISCORD_CHANNEL_ID: ${{ inputs.channel_id }}
        EXPECTED_RESPONSE: ${{ inputs.expected_response }}
        MESSAGE: ${{ inputs.message }}
        MAX_RETRIES: 10
      run: |
        for i in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $i of $MAX_RETRIES..."
          sleep 1
          RESPONSE=$(curl -s -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages?limit=1" \
            | jq '.[0]')

          MESSAGE_CONTENT=$(echo "$RESPONSE" | jq -r '.content')
          AUTHOR_ID=$(echo "$RESPONSE" | jq -r '.author.id')

          if [ "$AUTHOR_ID" != "$BETA_BOT_ID" ]; then
            echo "Expected response from beta bot, but got response from $AUTHOR_ID, retrying..."
            continue
          fi

          if [ "$MESSAGE_CONTENT" != "$EXPECTED_RESPONSE" ] && [ "$EXPECTED_RESPONSE" != "" ]; then
            echo "Expected response: $EXPECTED_RESPONSE, but got: $MESSAGE_CONTENT, retrying..."
            continue
          fi

          echo "Response received: $MESSAGE_CONTENT"
          echo "PASS|${MESSAGE}" >> "${RUNNER_TEMP}/comprobot_results.txt"
          exit 0
        done

        echo "Max retries ($MAX_RETRIES) reached without a valid response"
        echo "FAIL|${MESSAGE}" >> "${RUNNER_TEMP}/comprobot_results.txt"
        exit 1
      shell: bash

    - name: Report failure
      if: failure()
      env:
        DISCORD_BOT_TOKEN: ${{ inputs.discord_bot_token }}
        DISCORD_CHANNEL_ID: ${{ inputs.channel_id }}
        MESSAGE: ${{ inputs.message }}
      run: |
        PAYLOAD=$(jq -n --arg content "❌ \`$MESSAGE\` — command timed out" '{content: $content}')
        curl -s -X POST \
          -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages"
      shell: bash
