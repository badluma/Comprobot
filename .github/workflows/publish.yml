name: Publish to PyPI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  deploy:
    name: "Deploy to server"
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/staging.key
          chmod 600 ~/.ssh/staging.key
          cat >>~/.ssh/config <<END
          Host staging
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/staging.key
            StrictHostKeyChecking no
          END
        env:
          SSH_USER: ${{ secrets.USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.HOST }}

      - name: Kill all screen instances
        run: ssh staging "pkill screen || true"

      - name: Upgrade Comprobot
        run: ssh staging "pipx upgrade-all"

      - name: Restart Comprobot
        # Wait briefly to ensure pkill has fully cleaned up before spawning a new session
        run: ssh staging "sleep 1 && screen -d -m -S Comprobot bash -c comprobot"
