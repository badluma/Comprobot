name: Publish

"on":
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  gate:
    name: "Check version bumped"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Verify pyproject.toml version changed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('proceed', 'true');
              return;
            }

            const sha = context.payload.workflow_run.head_sha;

            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });
            if (!commit.files?.some(f => f.filename === 'pyproject.toml')) {
              core.setOutput('proceed', 'false');
              return;
            }

            const getVersion = async (ref) => {
              const { data: file } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'pyproject.toml',
                ref,
              });
              const content = Buffer.from(file.content, 'base64').toString();
              return content.match(/^version\s*=\s*"(.+)"/m)?.[1];
            };

            const currentVersion = await getVersion(sha);
            const parentSha = commit.parents[0]?.sha;
            const parentVersion = parentSha ? await getVersion(parentSha) : null;

            core.setOutput('proceed', String(!!currentVersion && currentVersion !== parentVersion));

  release:
    name: "Create GitHub Release"
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          make_latest: true
          generate_release_notes: true

  pypi:
    name: "Publish to PyPI"
    needs: release
    runs-on: ubuntu-latest
    environment: PyPI
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  launchpad:
    name: "Publish to Launchpad PPA"
    needs: release
    runs-on: ubuntu-latest
    environment: Launchpad
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install packaging tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential devscripts debhelper dh-python python3-all python3-setuptools python3-pip pybuild-plugin-pyproject

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent
          KEYGRIP=$(gpg --with-keygrip --list-secret-keys "$GPG_KEY_ID" | grep Keygrip | head -1 | awk '{print $3}')
          echo "$GPG_PASSPHRASE" | /usr/lib/gnupg2/gpg-preset-passphrase --preset "$KEYGRIP"

      - name: Update changelog version
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          DEBEMAIL="macumba-51sandbar@icloud.com" DEBFULLNAME="badluma" \
            dch --newversion "$VERSION" --distribution noble "Release $VERSION."

      - name: Build source package
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          debuild -k"$GPG_KEY_ID" -S -sa

      - name: Upload to PPA
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: dput ppa:badluma/ppa ../comprobot_${VERSION}_source.changes

  aur:
    name: "Publish to AUR"
    needs: release
    runs-on: ubuntu-latest
    environment: AUR
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Update PKGBUILD version
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: comprobot
          pkgbuild: ./aur/PKGBUILD
          commit_username: badluma
          commit_email: tarmac_quarrel_7f@icloud.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to v${{ needs.release.outputs.version }}"
          updpkgsums: true

  scoop:
    name: "Update Scoop Manifest"
    needs: release
    runs-on: ubuntu-latest
    environment: Scoop
    steps:
      - name: Update manifest
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/badluma/scoop-bucket.git"
          cd scoop-bucket

          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" comprobot.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add comprobot.json
          git commit -m "chore: update comprobot to v${VERSION}"
          git push

  brew:
    name: "Update Homebrew Formula"
    needs: release
    runs-on: ubuntu-latest
    environment: Homebrew
    steps:
      - name: Update formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          URL="https://github.com/badluma/Comprobot/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/badluma/homebrew-homebrew.git"
          cd homebrew-homebrew

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/comprobot.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/comprobot.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/comprobot.rb
          git commit -m "chore: update comprobot to v${VERSION}"
          git push

  binaries:
    name: "Build standalone binaries"
    needs: release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: comprobot-linux
          - os: macos-latest
            artifact: comprobot-macos
          - os: windows-latest
            artifact: comprobot-windows
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build binary
        shell: bash
        run: |
          pip install pyinstaller .
          pyinstaller --onefile --collect-all src --name ${{ matrix.artifact }} _entry.py

      - name: Upload to release (Unix)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: dist/${{ matrix.artifact }}

      - name: Upload to release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: dist/${{ matrix.artifact }}.exe

  docker:
    name: "Publish to Docker Hub"
    needs: release
    runs-on: ubuntu-latest
    environment: DockerHub
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/comprobot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/comprobot:${{ needs.release.outputs.version }}

  winget:
    name: "Publish to winget"
    needs: [release, binaries]
    runs-on: ubuntu-latest
    environment: winget
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: badluma.Comprobot
          release-tag: v${{ needs.release.outputs.version }}
          installers-regex: 'comprobot-windows\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
