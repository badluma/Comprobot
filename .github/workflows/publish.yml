name: Publish

on:
  push:
    branches: [main]
    paths: [pyproject.toml]
  workflow_dispatch:

jobs:
  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          make_latest: true
          generate_release_notes: true

  pypi:
    name: "Publish to PyPI"
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  brew:
    name: "Update Homebrew Formula"
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          URL="https://github.com/badluma/Comprobot/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/badluma/homebrew-homebrew.git"
          cd homebrew-homebrew

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/comprobot.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/comprobot.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/comprobot.rb
          git commit -m "chore: update comprobot to v${VERSION}"
          git push
