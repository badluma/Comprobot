name: Publish

"on":
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  gate:
    name: "Check version bumped"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Verify pyproject.toml version changed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('proceed', 'true');
              return;
            }

            const sha = context.payload.workflow_run.head_sha;

            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            });
            if (!commit.files?.some(f => f.filename === 'pyproject.toml')) {
              core.setOutput('proceed', 'false');
              return;
            }

            const getVersion = async (ref) => {
              const { data: file } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'pyproject.toml',
                ref,
              });
              const content = Buffer.from(file.content, 'base64').toString();
              return content.match(/^version\s*=\s*"(.+)"/m)?.[1];
            };

            const currentVersion = await getVersion(sha);
            const parentSha = commit.parents[0]?.sha;
            const parentVersion = parentSha ? await getVersion(parentSha) : null;

            core.setOutput('proceed', String(!!currentVersion && currentVersion !== parentVersion));

  release:
    name: "Create GitHub Release"
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          make_latest: true
          generate_release_notes: true

  pypi:
    name: "Publish to PyPI"
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  launchpad:
    name: "Publish to Launchpad PPA"
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install packaging tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y devscripts debhelper dh-python python3-all python3-setuptools python3-pip

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Update changelog version
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          DEBEMAIL="macumba-51sandbar@icloud.com" DEBFULLNAME="badluma" \
            dch --newversion "$VERSION" --distribution noble "Release $VERSION."

      - name: Build source package
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cat > /tmp/gpg-sign.sh << 'EOF'
          #!/bin/bash
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback "$@"
          EOF
          chmod +x /tmp/gpg-sign.sh
          debuild -k"$GPG_KEY_ID" -S -sa -p/tmp/gpg-sign.sh

      - name: Upload to PPA
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: dput ppa:badluma/ppa ../comprobot_${VERSION}_source.changes

  scoop:
    name: "Update Scoop Manifest"
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update manifest
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/badluma/scoop-bucket.git"
          cd scoop-bucket

          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" comprobot.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add comprobot.json
          git commit -m "chore: update comprobot to v${VERSION}"
          git push

  brew:
    name: "Update Homebrew Formula"
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          URL="https://github.com/badluma/Comprobot/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/badluma/homebrew-homebrew.git"
          cd homebrew-homebrew

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/comprobot.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/comprobot.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/comprobot.rb
          git commit -m "chore: update comprobot to v${VERSION}"
          git push
