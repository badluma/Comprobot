name: Publishing

"on":
  workflow_run:
    workflows: ["Running Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: "Check if version changed"
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            OLD=$(git show HEAD~1:pyproject.toml 2>/dev/null | grep '^version' | sed 's/version = "\(.*\)"/\1/' || echo "")
            NEW=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            if [ "$OLD" != "$NEW" ] && [ -n "$NEW" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  release:
    name: "Create GitHub Release"
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          make_latest: true
          generate_release_notes: true

  pypi:
    name: "Publish to PyPI"
    needs: release
    runs-on: ubuntu-latest
    environment: PyPI
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  launchpad:
    name: "Publish to Launchpad PPA"
    needs: release
    runs-on: ubuntu-latest
    environment: Launchpad
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Install packaging tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential devscripts debhelper dh-python python3-all python3-setuptools python3-pip pybuild-plugin-pyproject

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent
          KEYGRIP=$(gpg --with-keygrip --list-secret-keys "$GPG_KEY_ID" | grep Keygrip | head -1 | awk '{print $3}')
          echo "$GPG_PASSPHRASE" | /usr/lib/gnupg2/gpg-preset-passphrase --preset "$KEYGRIP"

      - name: Build source package
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          debuild -k"$GPG_KEY_ID" -S -sa

      - name: Upload to PPA
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: dput ppa:badluma/ppa ../comprobot_${VERSION}_source.changes

  aur:
    name: "Publish to AUR"
    needs: [release, pypi]
    runs-on: ubuntu-latest
    environment: AUR
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Update PKGBUILD version
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: comprobot
          pkgbuild: ./aur/PKGBUILD
          commit_username: badluma
          commit_email: 226042779+badluma@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to v${{ needs.release.outputs.version }}"
          updpkgsums: true

  scoop:
    name: "Update Scoop Manifest"
    needs: [release, binaries]
    runs-on: ubuntu-latest
    environment: Scoop
    steps:
      - name: Update manifest
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          SHA256=$(curl -sL "https://github.com/badluma/Comprobot/releases/download/v${VERSION}/comprobot.exe" | sha256sum | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/badluma/scoop-bucket.git"
          cd scoop-bucket
          mkdir -p bucket

          cat > bucket/comprobot.json <<EOF
          {
              "version": "${VERSION}",
              "description": "A self-hostable Discord bot built for maximum customization.",
              "homepage": "https://github.com/badluma/Comprobot",
              "license": "MIT",
              "url": "https://github.com/badluma/Comprobot/releases/download/v${VERSION}/comprobot.exe",
              "hash": "${SHA256}",
              "bin": "comprobot.exe"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/comprobot.json
          git commit -m "chore: update comprobot to v${VERSION}"
          git push

  brew:
    name: "Update Homebrew Formula"
    needs: release
    runs-on: ubuntu-latest
    environment: Homebrew
    steps:
      - name: Update formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          URL="https://github.com/badluma/Comprobot/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/badluma/homebrew-tap.git"
          cd homebrew-tap

          sed -i "s|^  url \".*\"|  url \"${URL}\"|" Formula/comprobot.rb
          sed -i "s|^  sha256 \".*\"|  sha256 \"${SHA256}\"|" Formula/comprobot.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/comprobot.rb
          git commit -m "chore: update comprobot to v${VERSION}"
          git push

  bottle:
    name: "Build Homebrew bottle"
    needs: [release, brew]
    strategy:
      matrix:
        os: [macos-14, macos-15, macos-26]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Build bottle
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          brew tap badluma/tap
          brew install --build-bottle badluma/tap/comprobot
          brew bottle --json \
            --root-url "https://github.com/badluma/Comprobot/releases/download/v${VERSION}" \
            badluma/tap/comprobot

      - name: Upload bottle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: "*.bottle*.tar.gz"

      - name: Upload bottle JSON
        uses: actions/upload-artifact@v4
        with:
          name: bottle-json-${{ matrix.os }}
          path: "*.bottle.json"

  merge-bottles:
    name: "Add bottle info to formula"
    needs: [release, bottle]
    runs-on: macos-latest
    environment: Homebrew
    steps:
      - name: Download bottle JSONs
        uses: actions/download-artifact@v4
        with:
          pattern: bottle-json-*
          merge-multiple: true

      - name: Update formula with bottle block
        env:
          VERSION: ${{ needs.release.outputs.version }}
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          BREW_TAPS="$(brew --repository)/Library/Taps"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/badluma/homebrew-tap.git" \
            "$BREW_TAPS/badluma/homebrew-tap"
          brew bottle --merge --write --no-commit *.bottle.json
          cd "$BREW_TAPS/badluma/homebrew-tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/comprobot.rb
          git commit -m "chore: add bottles for v${VERSION}"
          git push

  binaries:
    name: "Build standalone binaries"
    needs: release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: comprobot-linux
          - os: macos-latest
            artifact: comprobot-macos
          - os: windows-latest
            artifact: comprobot
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build binary
        shell: bash
        run: |
          pip install pyinstaller .
          pyinstaller --onefile --collect-all src --name ${{ matrix.artifact }} _entry.py

      - name: Upload to release (Unix)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: dist/${{ matrix.artifact }}

      - name: Upload to release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: dist/${{ matrix.artifact }}.exe

  docker:
    name: "Publish to Docker Hub"
    needs: release
    runs-on: ubuntu-latest
    environment: DockerHub
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/comprobot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/comprobot:${{ needs.release.outputs.version }}

  winget:
    name: "Publish to winget"
    needs: [release, binaries]
    runs-on: ubuntu-latest
    environment: winget
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: badluma.Comprobot
          release-tag: v${{ needs.release.outputs.version }}
          installers-regex: 'comprobot\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

  update-docs:
    name: "Update Documentation"
    needs:
      [
        release,
        pypi,
        launchpad,
        aur,
        scoop,
        merge-bottles,
        binaries,
        docker,
        winget,
      ]
    permissions:
      id-token: write
    if: |
      needs.release.result == 'success' &&
      needs.pypi.result == 'success' &&
      needs.launchpad.result == 'success' &&
      needs.aur.result == 'success' &&
      needs.scoop.result == 'success' &&
      needs.merge-bottles.result == 'success' &&
      needs.binaries.result == 'success' &&
      needs.docker.result == 'success' &&
      (needs.winget.result == 'success' || needs.winget.result == 'skipped')
    runs-on: ubuntu-latest
    environment: Docs
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4
        with:
          repository: badluma/Comprobot-Docs
          token: ${{ secrets.DOCS_PAT }}

      - name: Install tree
        run: sudo apt-get install -y tree

      - name: Configure git and create branch
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "docs/v${VERSION}"

      - name: Get release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.DOCS_PAT }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          {
            echo 'content<<EOF'
            gh api "repos/badluma/Comprobot/releases/tags/v${VERSION}" --jq .body
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Get doc file tree
        id: tree
        run: |
          {
            echo 'content<<EOF'
            tree --gitignore source/content
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Update docs with Claude
        uses: anthropics/claude-code-action@beta
        with:
          mode: agent
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Update the Comprobot documentation for the new release v${{ needs.release.outputs.version }}.

            Release notes:
            ${{ steps.notes.outputs.content }}

            Current documentation file tree:
            ${{ steps.tree.outputs.content }}

            Tasks:
            1. Add v${{ needs.release.outputs.version }} to the version history file with the release notes above
            2. Validate that all documentation is consistent and accurate for this version
            3. Update any markdown files that reference old version numbers or describe features/commands that changed in this release

            Be minimal — only edit files that genuinely need changes.

      - name: Create pull request
        env:
          VERSION: ${{ needs.release.outputs.version }}
          GH_TOKEN: ${{ secrets.DOCS_PAT }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No documentation changes needed"
            exit 0
          fi
          git commit -m "docs: update for v${VERSION}"
          git push origin "docs/v${VERSION}"
          gh pr create \
            --repo badluma/Comprobot-Docs \
            --title "v${VERSION}" \
            --body "Update documentation for Comprobot v${VERSION}" \
            --base main
