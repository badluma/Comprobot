name: Installation Test
on: workflow_dispatch

jobs:
  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    steps:
      - name: Install
        run: pip install comprobot
      - name: Test
        run: comprobot --version

  launchpad:
    name: Launchpad
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: sudo apt-get install -y software-properties-common
      - name: Add repository
        run: sudo add-apt-repository -y ppa:badluma/ppa
      - name: Update
        run: sudo apt-get update
      - name: Install
        run: sudo apt-get install -y comprobot
      - name: Test
        run: comprobot --version

  aur:
    name: AUR
    runs-on: ubuntu-latest
    container: archlinux
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm base-devel git
      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
      - name: Install yay
        run: |
          sudo -u builder bash -c "
            git clone https://aur.archlinux.org/yay-bin.git /tmp/yay-bin
            cd /tmp/yay-bin
            makepkg -si --noconfirm
          "
      - name: Install
        run: sudo -u builder yay -S --noconfirm comprobot
      - name: Test
        run: comprobot --version

  homebrew:
    name: Homebrew
    runs-on: macos-latest
    steps:
      - name: Tap repository
        run: brew tap badluma/tap
      - name: Install
        run: brew install comprobot
      - name: Test
        run: comprobot --version

  scoop:
    name: Scoop
    runs-on: windows-latest
    steps:
      - name: Setup scoop
        uses: MinoruSekine/setup-scoop@v4.0.2
      - name: Add bucket
        run: scoop bucket add badluma https://github.com/badluma/scoop-bucket
      - name: Install
        run: scoop install comprobot
      - name: Add to PATH
        run: echo "$env:USERPROFILE\scoop\shims" >> $env:GITHUB_PATH
      - name: Test
        run: comprobot --version

  winget:
    name: Winget
    runs-on: windows-latest
    steps:
      - name: Install
        run: winget install badluma.comprobot --accept-source-agreements --accept-package-agreements
      - name: Add to PATH
        run: |
          echo ([System.Environment]::GetEnvironmentVariable("PATH","User")) >> $env:GITHUB_PATH
          echo ([System.Environment]::GetEnvironmentVariable("PATH","Machine")) >> $env:GITHUB_PATH
      - name: Test
        run: comprobot --version

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - name: Install
        run: |
          docker run -d \
            -v comprobot-data:/root/.local/share/Comprobot \
            --name comprobot \
            badluma/comprobot:latest
      - name: Test
        run: docker exec comprobot comprobot --version
