name: Sync Dependencies

"on":
  push:
    branches: [main]
    paths: [pyproject.toml]
  workflow_dispatch:

jobs:
  sync:
    name: "Sync deps to AUR and Debian"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install devscripts
        run: sudo apt-get install -y devscripts

      - name: Update PKGBUILD, debian/control, and debian/changelog
        run: |
          python3 - <<'EOF'
          import re
          import tomllib

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          version = data["project"]["version"]
          deps = data["project"]["dependencies"]

          # PKGBUILD: update pkgver and the deps pip install line
          with open("aur/PKGBUILD") as f:
              pkgbuild = f.read()
          pkgbuild = re.sub(r"^pkgver=.*$", f"pkgver={version}", pkgbuild, flags=re.MULTILINE)
          pip_line = (
              '    pip install --root="$pkgdir" --prefix=/usr '
              + " ".join(deps)
              + "\n"
          )
          pkgbuild = re.sub(
              r'    pip install --root="\$pkgdir" --prefix=/usr (?!--no-deps).*\n',
              pip_line,
              pkgbuild,
          )
          with open("aur/PKGBUILD", "w") as f:
              f.write(pkgbuild)

          # debian/control: map known pypi packages to python3-* debian packages
          DEB_MAP = {
              "requests": "python3-requests",
              "appdirs": "python3-appdirs",
              "python-dotenv": "python3-dotenv",
              "httpx": "python3-httpx",
              "tomlkit": "python3-tomlkit",
          }
          deb_deps = ["${python3:Depends}", "python3-pip"]
          for dep in deps:
              base = re.sub(r"\[.*?\]", "", dep).strip().lower()
              base = re.split(r"[>=<!;\s]", base)[0].strip()
              if base in DEB_MAP:
                  deb_deps.append(DEB_MAP[base])
          with open("debian/control") as f:
              control = f.read()
          control = re.sub(
              r"^Depends:.*$",
              "Depends: " + ", ".join(deb_deps),
              control,
              flags=re.MULTILINE,
          )
          with open("debian/control", "w") as f:
              f.write(control)

          # Check if debian/changelog already has this version
          with open("debian/changelog") as f:
              first_line = f.readline()
          if not first_line.startswith(f"comprobot ({version})"):
              import subprocess
              subprocess.run(
                  ["dch", "--newversion", version, "--distribution", "noble", f"Release {version}."],
                  env={**__import__("os").environ, "DEBEMAIL": "macumba-51sandbar@icloud.com", "DEBFULLNAME": "badluma"},
                  check=True,
              )
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aur/PKGBUILD debian/control debian/changelog
          git diff --cached --quiet || git commit -m "chore: sync deps from pyproject.toml"
          git push
