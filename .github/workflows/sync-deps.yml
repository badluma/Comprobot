name: Sync Dependencies

"on":
  push:
    branches: [main]
    paths: [pyproject.toml]
  workflow_dispatch:

jobs:
  sync:
    name: "Sync deps to AUR and Debian"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install devscripts
        run: sudo apt-get install -y devscripts

      - name: Update PKGBUILD, debian/control, and debian/changelog
        run: python3 scripts/syncing.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aur/PKGBUILD debian/control debian/changelog
          git diff --cached --quiet || git commit -m "chore: sync deps from pyproject.toml"
          git push
