name: Test

"on":
  push:
    paths:
      - "src/**"
      - "pyproject.toml"

jobs:
  test-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: calculate
        run: comprobot test "!calculate 2+2"

      - name: qr
        run: comprobot test "!qr https://example.com"

      - name: ascii
        run: comprobot test "!ascii"

      - name: purge
        run: comprobot test "!purge"

      - name: balance (with username)
        run: comprobot test "!balance testuser"

      - name: add money
        run: comprobot test "!add testuser 100"

      - name: remove money
        run: comprobot test "!remove testuser 50"

  test-macos:
