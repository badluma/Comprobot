name: Test

"on":
  push:
    paths:
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/testing.yml"

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: calculate
        run: comprobot test "!calculate 2+2"

      - name: qr
        run: comprobot test "!qr https://example.com"

      - name: ascii
        run: comprobot test "!ascii"

      - name: purge
        run: comprobot test "!purge"

      - name: balance (with username)
        run: comprobot test "!balance testuser"

      - name: add money
        run: comprobot test "!add testuser 100"

      - name: remove money
        run: comprobot test "!remove testuser 50"

  macos:
    name: MacOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: calculate
        run: comprobot test "!calculate 2+2"

      - name: qr
        run: comprobot test "!qr https://example.com"

      - name: ascii
        run: comprobot test "!ascii"

      - name: purge
        run: comprobot test "!purge"

      - name: balance (with username)
        run: comprobot test "!balance testuser"

      - name: add money
        run: comprobot test "!add testuser 100"

      - name: remove money
        run: comprobot test "!remove testuser 50"

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: calculate
        run: comprobot test "!calculate 2+2"

      - name: qr
        run: comprobot test "!qr https://example.com"

      - name: ascii
        run: comprobot test "!ascii"

      - name: purge
        run: comprobot test "!purge"

      - name: balance (with username)
        run: comprobot test "!balance testuser"

      - name: add money
        run: comprobot test "!add testuser 100"

      - name: remove money
        run: comprobot test "!remove testuser 50"

  discord:
    name: Discord
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          REF="${REF#refs/heads/}"
          echo "VERSION=$REF" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=%s)" >> $GITHUB_ENV
          echo "COMMIT_COUNT=$(git rev-list --count HEAD)" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle.key
          chmod 600 ~/.ssh/oracle.key

      - name: Deploy bot to Oracle
        run: |
          ssh -i ~/.ssh/oracle.key -o StrictHostKeyChecking=no ubuntu@${{ secrets.ORACLE_HOST }} "
            set -e
            rm -rf ~/comprobot_ci
            git clone --depth=1 --branch ${GITHUB_REF_NAME} ${{ github.server_url }}/${{ github.repository }}.git ~/comprobot_ci
            cd ~/comprobot_ci
            python3 -m pip install -e '.[dev]' -q --break-system-packages
          "

      # Start
      - name: Configure and start bot on Oracle
        run: |
          ssh -i ~/.ssh/oracle.key -o StrictHostKeyChecking=no ubuntu@${{ secrets.ORACLE_HOST }} "
            export PATH=\$HOME/.local/bin:\$PATH
            comprobot config secrets BOT_TOKEN '${{ secrets.BETA_BOT_TOKEN }}'
            comprobot config config prefix 'test!'
            comprobot config ai activate_ai false
            comprobot config config bot_admins '${{ secrets.SENDER_BOT_ID }}'
            nohup comprobot start > ~/bot.log 2>&1 < /dev/null &
            echo \$! > ~/bot.pid
            disown
          "

      - name: Startup delay
        run: sleep 15

      # Title
      - name: Send details
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          REPO_NAME: ${{ github.event.repository.name }}
          ACTOR: ${{ github.actor }}
        run: |
          MESSAGE=$(printf "# %s\n%s %s\n-# Pushed by: %s\n-# Commit count: %s\n-# Commit SHA: %s" \
            "$COMMIT_MSG" "$REPO_NAME" "$VERSION" "$ACTOR" "$COMMIT_COUNT" "$SHORT_SHA")
          PAYLOAD=$(jq -n --arg content "$MESSAGE" '{content: $content}')
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages")
          echo "Send details response: $RESPONSE"
          MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$MESSAGE_ID" = "null" ] || [ -z "$MESSAGE_ID" ]; then
            echo "Failed to send message. Response: $RESPONSE"
            exit 1
          fi
          echo "DISCORD_MESSAGE_ID=$MESSAGE_ID" >> $GITHUB_ENV

      - name: Create thread
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"Tests - ${{ env.SHORT_SHA }}\", \"auto_archive_duration\": 60}" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages/${{ env.DISCORD_MESSAGE_ID }}/threads")
          echo "Create thread response: $RESPONSE"
          THREAD_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$THREAD_ID" = "null" ] || [ -z "$THREAD_ID" ]; then
            echo "Failed to create thread. Response: $RESPONSE"
            exit 1
          fi
          echo "DISCORD_THREAD_ID=$THREAD_ID" >> $GITHUB_ENV

      # Test commands
      - name: Send and wait for response
        uses: ./.github/actions/send
        with:
          message: "test!quote"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}

      # Stop
      - name: Show bot log
        if: always()
        run: ssh -i ~/.ssh/oracle.key -o StrictHostKeyChecking=no ubuntu@${{ secrets.ORACLE_HOST }} "cat ~/bot.log" || true

      - name: Stop bot
        if: always()
        run: ssh -i ~/.ssh/oracle.key -o StrictHostKeyChecking=no ubuntu@${{ secrets.ORACLE_HOST }} "kill \$(cat ~/bot.pid) 2>/dev/null || true" || true
