      - name: calculate (2+2)
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!calculate 2+2"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}
          expected_response: "4"

      - name: calculate (10/2)
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!calculate 10/2"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}
          expected_response: "5.0"

      - name: qr code
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!qr https://example.com"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}

      - name: bitcoin (usd)
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!bitcoin"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
