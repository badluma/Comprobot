name: Running Tests

"on":
  push:
    paths:
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/testing.yml"

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: calculate
        run: comprobot test "!calculate 2+2"

      - name: qr
        run: comprobot test "!qr https://example.com"

      - name: ascii
        run: comprobot test "!ascii"

      - name: purge
        run: comprobot test "!purge"

      - name: balance (with username)
        run: comprobot test "!balance testuser"

      - name: add money
        run: comprobot test "!add testuser 100"

      - name: remove money
        run: comprobot test "!remove testuser 50"

  macos:
    name: MacOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: calculate
        run: comprobot test "!calculate 2+2"

      - name: qr
        run: comprobot test "!qr https://example.com"

      - name: ascii
        run: comprobot test "!ascii"

      - name: purge
        run: comprobot test "!purge"

      - name: balance (with username)
        run: comprobot test "!balance testuser"

      - name: add money
        run: comprobot test "!add testuser 100"

      - name: remove money
        run: comprobot test "!remove testuser 50"

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: calculate
        run: comprobot test "!calculate 2+2"

      - name: qr
        run: comprobot test "!qr https://example.com"

      - name: ascii
        run: comprobot test "!ascii"

      - name: purge
        run: comprobot test "!purge"

      - name: balance (with username)
        run: comprobot test "!balance testuser"

      - name: add money
        run: comprobot test "!add testuser 100"

      - name: remove money
        run: comprobot test "!remove testuser 50"

  discord:
    name: Discord
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          echo "VERSION=v$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --pretty=%s)" >> $GITHUB_ENV
          echo "COMMIT_COUNT=$(echo '${{ toJson(github.event.commits) }}' | jq 'length')" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup SSH
        env:
          ORACLE_IP: ${{ secrets.ORACLE_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/oracle.key
          chmod 600 ~/.ssh/oracle.key
          ssh-keyscan -H "$ORACLE_IP" >> ~/.ssh/known_hosts

      - name: Deploy bot
        env:
          ORACLE_IP: ${{ secrets.ORACLE_IP }}
          BETA_BOT_TOKEN: ${{ secrets.BETA_BOT_TOKEN }}
        run: |
          ssh -i ~/.ssh/oracle.key ubuntu@$ORACLE_IP 'bash -s' << 'REMOTE'
            set -e
            if [ -d ~/comprobot-beta ]; then
              cd ~/comprobot-beta
              git fetch origin && git reset --hard origin/main
            else
              git clone --depth 1 https://github.com/${{ github.repository }}.git ~/comprobot-beta
            fi
            cd ~/comprobot-beta
            pip install --user -e ".[dev]" -q
            mkdir -p ~/.local/share/Comprobot
            export PATH="$HOME/.local/bin:$PATH"
            comprobot config config prefix "test!"
          REMOTE
          printf 'BOT_TOKEN=%s\n' "$BETA_BOT_TOKEN" | \
            ssh -i ~/.ssh/oracle.key ubuntu@$ORACLE_IP 'cat > ~/.local/share/Comprobot/.env'

      - name: Start bot
        env:
          ORACLE_IP: ${{ secrets.ORACLE_IP }}
        run: |
          ssh -i ~/.ssh/oracle.key ubuntu@$ORACLE_IP '
            export PATH="$HOME/.local/bin:$PATH"
            nohup comprobot start > /tmp/comprobot-beta.log 2>&1 &
            echo $! > /tmp/comprobot-beta.pid
          '

      - name: Startup delay
        run: sleep 15

      # Title
      - name: Send details
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          REPO_NAME: ${{ github.event.repository.name }}
          ACTOR: ${{ github.actor }}
        run: |
          MESSAGE=$(printf "# %s\n%s %s\n-# Pushed by: %s\n-# Commit count: %s\n-# Commit SHA: %s" \
            "$COMMIT_MSG" "$REPO_NAME" "$VERSION" "$ACTOR" "$COMMIT_COUNT" "$SHORT_SHA")
          PAYLOAD=$(jq -n --arg content "$MESSAGE" '{content: $content}')
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages")
          echo "Send details response: $RESPONSE"
          MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$MESSAGE_ID" = "null" ] || [ -z "$MESSAGE_ID" ]; then
            echo "Failed to send message. Response: $RESPONSE"
            exit 1
          fi
          echo "DISCORD_MESSAGE_ID=$MESSAGE_ID" >> $GITHUB_ENV

      - name: Create thread
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"Tests - ${{ env.SHORT_SHA }}\", \"auto_archive_duration\": 60}" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages/${{ env.DISCORD_MESSAGE_ID }}/threads")
          echo "Create thread response: $RESPONSE"
          THREAD_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$THREAD_ID" = "null" ] || [ -z "$THREAD_ID" ]; then
            echo "Failed to create thread. Response: $RESPONSE"
            exit 1
          fi
          echo "DISCORD_THREAD_ID=$THREAD_ID" >> $GITHUB_ENV

      # Test commands
      - name: quote
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!quote"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}

      - name: joke
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!joke"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}

      - name: meme
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!meme"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}

      - name: waifu
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!waifu"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}

      - name: duck
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!duck"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}

      - name: dog
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!dog"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}

      - name: cat
        uses: ./.github/actions/send
        continue-on-error: true
        with:
          message: "test!cat"
          channel_id: ${{ env.DISCORD_THREAD_ID }}
          discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
          beta_bot_id: ${{ secrets.BETA_BOT_ID }}

      - name: chuck norris
        uses: ./.github/actions/send
        continue-on-error: true
        with:
